name: Build macOS DMG

on:
    workflow_dispatch:

jobs:
    build-mac:
        runs-on: macos-latest
        # Opting into Node.js 24 globally for this job
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        steps:
            - name: Checkout repo
              uses: actions/checkout@main # Keep an eye out for v5 if released soon

            - name: Set up Python
              uses: actions/setup-python@main
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install pyinstaller opencv-python numpy customtkinter pynput mss requests

            - name: Build with PyInstaller
              run: |
                  pyinstaller --onedir --windowed \
                    --icon="icf IcantFish icon.icns" \
                    --add-data "configs:configs" \
                    --osx-bundle-identifier="com.yourcompany.IcantFish" \
                    --target-architecture="arm64;x86_64" \
                    --hidden-import=cIcantFish \
                    --hidden-import=numpy \
                    --collect-all customtkinter \
                    IcantFish.py

            - name: Check dist contents
              run: |
                  ls -lh dist
                  echo "Contents of dist:"
                  ls -la dist/

            - name: Create DMG from .app bundle
              run: |
                  APP_PATH=$(find dist -name "*.app" -type d | head -n 1)
                  echo "Found app at: $APP_PATH"
                  
                  hdiutil create \
                    -volname "IcantFish" \
                    -srcfolder "$APP_PATH" \
                    -ov \
                    -format UDZO \
                    IcantFish.dmg
                  
                  echo "DMG created:"
                  ls -lh IcantFish.dmg

            - name: Upload DMG artifact
              uses: actions/upload-artifact@v4